<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI · 角色扮演</title>
    <style>
        /* ---------- 全局 CSS 变量 ---------- */
        :root {
            --bg-body: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-chat: #ffffff;
            --border-light: #f0f0f0;
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --text-reasoning: #888;
            --card-active-bg: #fafafa;
            --card-active-border: #eaeaea;
            --input-border: #e0e0e0;
            --button-bg: #2c3e50;
            --button-hover: #1e2b38;
            --badge-bg: #f5f5f5;
            --modal-bg: white;
            --modal-overlay: rgba(0,0,0,0.4);
        }

        body.dark {
            --bg-body: #121212;
            --bg-sidebar: #1e1e2a;
            --bg-chat: #1e1e2a;
            --border-light: #2a2a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --text-reasoning: #aaa;
            --card-active-bg: #2a2a3a;
            --card-active-border: #3a3a4a;
            --input-border: #3a3a4a;
            --button-bg: #3a4c62;
            --button-hover: #2c3e50;
            --badge-bg: #2a2a3a;
            --modal-bg: #2a2a3a;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: background 0.2s, color 0.2s;
            color: var(--text-primary);
        }

        .app-container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 角色侧边栏 - 可折叠 */
        .role-sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            transition: width 0.25s ease, padding 0.25s ease;
            position: relative;
        }
        .role-sidebar.collapsed {
            width: 48px;
            min-width: 48px;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            transition: opacity 0.2s;
        }
        .collapsed .sidebar-content {
            opacity: 0;
            pointer-events: none;
        }
        .collapse-btn {
            position: absolute;
            right: -12px;
            top: 20px;
            background: var(--badge-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            font-size: 12px;
            color: var(--text-primary);
            transition: 0.2s;
        }
        .collapsed .collapse-btn {
            transform: rotate(180deg);
        }

        .sidebar-header {
            padding: 20px 16px;
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }
        .collapsed .sidebar-header {
            justify-content: center;
            padding: 20px 0;
        }
        .collapsed .sidebar-header span:first-child {
            display: none;
        }
        .add-role-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .collapsed .add-role-btn {
            margin: 0 auto;
        }
        .role-list {
            padding: 12px;
        }
        .role-card {
            background: transparent;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .role-card.active {
            background: var(--card-active-bg);
            border-color: var(--card-active-border);
        }
        .role-name {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            color: var(--text-primary);
        }
        .role-preview {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .role-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        .role-actions button {
            background: none;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            background: var(--badge-bg);
            color: var(--text-secondary);
        }
        .conversation-section {
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
            padding-top: 8px;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .add-conv-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .conv-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .conv-item {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .conv-item.active {
            background: var(--card-active-bg);
            border: 1px solid var(--card-active-border);
        }
        .conv-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-actions {
            display: none;
            gap: 6px;
        }
        .conv-item:hover .conv-actions {
            display: flex;
        }
        .conv-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .current-role-badge {
            font-size: 0.8rem;
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-primary);
        }
        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }
        .model-selector select {
            background: var(--badge-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }
        .theme-toggle {
            background: var(--badge-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            transition: 0.2s;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .user-message {
            text-align: right;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.4;
            padding: 4px 0;
        }
        .assistant-message {
            text-align: left;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.4;
            padding: 4px 0;
        }
        .reasoning-content {
            font-size: 0.8rem;
            color: var(--text-reasoning);
            background: transparent;
            padding: 8px 0 4px 0;
            margin-bottom: 8px;
            border-left: 2px solid var(--border-light);
            padding-left: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .main-content {
            font-size: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
            background: var(--bg-chat);
        }
        #messageInput {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--input-border);
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-sidebar);
            color: var(--text-primary);
        }
        button {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 8px;
            font-size: 0.8rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            padding: 24px;
            color: var(--text-primary);
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--input-border);
            border-radius: 16px;
            background: var(--bg-sidebar);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
        }
        .modal-content textarea {
            min-height: 280px;
            resize: vertical;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        @media (max-width: 700px) {
            body { padding: 12px; }
            .app-container { gap: 12px; }
            .role-sidebar { width: 260px; }
            .role-sidebar.collapsed { width: 48px; }
            .conv-list { max-height: 120px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="role-sidebar" id="roleSidebar">
        <div class="collapse-btn" id="collapseBtn">◀</div>
        <div class="sidebar-content">
            <div class="sidebar-header">
                <span>🎭 角色卡</span>
                <button class="add-role-btn" id="addRoleBtn">+</button>
            </div>
            <div class="role-list" id="roleList"></div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                🤖 DeepSeek · 角色扮演
                <span class="current-role-badge" id="currentRoleBadge">未选择</span>
            </div>
            <div style="display: flex; gap: 12px;">
                <div class="model-selector">
                    <span>🧠 模型：</span>
                    <select id="modelSelect">
                        <option value="deepseek-chat">deepseek-chat (标准)</option>
                        <option value="deepseek-reasoner">deepseek-reasoner (推理)</option>
                    </select>
                </div>
                <button class="theme-toggle" id="themeToggle">🌙 夜晚模式</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="assistant-message">请从左侧选择一个角色和会话开始～</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<!-- 编辑角色弹窗 -->
<div id="roleModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">编辑角色</h3>
        <input type="text" id="roleName" placeholder="角色名称">
        <textarea id="rolePrompt" placeholder="系统提示词（人设）..."></textarea>
        <div class="modal-buttons">
            <button id="saveRoleBtn">保存</button>
            <button id="cancelModalBtn">取消</button>
        </div>
    </div>
</div>

<!-- 重命名会话弹窗 -->
<div id="renameConvModal" class="modal">
    <div class="modal-content">
        <h3>重命名会话</h3>
        <input type="text" id="newConvName" placeholder="新名称">
        <div class="modal-buttons">
            <button id="confirmRenameBtn">确定</button>
            <button id="cancelRenameBtn">取消</button>
        </div>
    </div>
</div>

<script>
    // ========== 配置区 ==========
    const WORKER_URL = 'https://still-bread-327a.liaoyilin826.workers.dev/';
    const CUSTOM_SECRET = 'xK9mP2vL7qR4nF8t';
    // ==========================

    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const roleListDiv = document.getElementById('roleList');
    const currentRoleBadge = document.getElementById('currentRoleBadge');
    const addRoleBtn = document.getElementById('addRoleBtn');
    const roleModal = document.getElementById('roleModal');
    const modalTitle = document.getElementById('modalTitle');
    const roleNameInput = document.getElementById('roleName');
    const rolePromptInput = document.getElementById('rolePrompt');
    const saveRoleBtn = document.getElementById('saveRoleBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const modelSelect = document.getElementById('modelSelect');
    const themeToggle = document.getElementById('themeToggle');
    const renameConvModal = document.getElementById('renameConvModal');
    const newConvNameInput = document.getElementById('newConvName');
    const confirmRenameBtn = document.getElementById('confirmRenameBtn');
    const cancelRenameBtn = document.getElementById('cancelRenameBtn');
    const roleSidebar = document.getElementById('roleSidebar');
    const collapseBtn = document.getElementById('collapseBtn');

    // 数据结构
    let roles = [];
    let currentRoleId = null;
    let currentConversationId = null;
    let currentModel = 'deepseek-chat';

    function generateId() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random();
    }

    // 默认只有一个占位角色
    const defaultRole = {
        id: 'default_role',
        name: '新角色',
        systemPrompt: '你是一个乐于助人的AI助手。',
        conversations: []
    };

    function ensureDefaultRoles() {
        if (!roles || roles.length === 0) {
            roles = [JSON.parse(JSON.stringify(defaultRole))];
        }
        for (let role of roles) {
            if (!role.conversations || role.conversations.length === 0) {
                role.conversations = [{
                    id: generateId(),
                    name: '新对话',
                    messages: [{ role: 'assistant', content: `你好！我是${role.name}，开始对话吧～`, reasoning: null }]
                }];
            }
        }
        saveData();
    }

    function saveData() {
        const data = { roles, currentRoleId, currentConversationId, currentModel };
        localStorage.setItem('deepseek_app_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('deepseek_app_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                roles = data.roles || [];
                currentRoleId = data.currentRoleId || null;
                currentConversationId = data.currentConversationId || null;
                currentModel = data.currentModel || 'deepseek-chat';
                modelSelect.value = currentModel;
            } catch(e) { console.error(e); }
        }
        if (!roles || roles.length === 0) {
            roles = [JSON.parse(JSON.stringify(defaultRole))];
        }
        ensureDefaultRoles();
        if (!roles.find(r => r.id === currentRoleId) && roles.length) currentRoleId = roles[0].id;
        if (currentRoleId) {
            const role = roles.find(r => r.id === currentRoleId);
            if (role && (!currentConversationId || !role.conversations.find(c => c.id === currentConversationId))) {
                currentConversationId = role.conversations[0]?.id || null;
            }
        }
        saveData();
    }

    function getCurrentRole() { return roles.find(r => r.id === currentRoleId); }
    function getCurrentConversation() {
        const role = getCurrentRole();
        if (!role) return null;
        return role.conversations.find(c => c.id === currentConversationId);
    }

    // 折叠侧边栏
    let sidebarCollapsed = false;
    function loadSidebarState() {
        const saved = localStorage.getItem('sidebar_collapsed');
        if (saved === 'true') {
            sidebarCollapsed = true;
            roleSidebar.classList.add('collapsed');
            collapseBtn.innerHTML = '▶';
        } else {
            sidebarCollapsed = false;
            roleSidebar.classList.remove('collapsed');
            collapseBtn.innerHTML = '◀';
        }
    }
    function toggleSidebar() {
        sidebarCollapsed = !sidebarCollapsed;
        if (sidebarCollapsed) {
            roleSidebar.classList.add('collapsed');
            collapseBtn.innerHTML = '▶';
        } else {
            roleSidebar.classList.remove('collapsed');
            collapseBtn.innerHTML = '◀';
        }
        localStorage.setItem('sidebar_collapsed', sidebarCollapsed);
    }

    // 渲染侧边栏
    function renderSidebar() {
        roleListDiv.innerHTML = '';
        for (let role of roles) {
            const roleCard = document.createElement('div');
            roleCard.className = `role-card ${currentRoleId === role.id ? 'active' : ''}`;
            roleCard.innerHTML = `
                <div class="role-name">
                    ${escapeHtml(role.name)}
                    <div class="role-actions">
                        <button class="edit-role-btn" data-id="${role.id}">编辑</button>
                        <button class="delete-role-btn" data-id="${role.id}">删除</button>
                    </div>
                </div>
                <div class="role-preview">${escapeHtml(role.systemPrompt.substring(0, 45))}...</div>
            `;
            roleCard.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                switchRole(role.id);
            });
            roleCard.querySelector('.edit-role-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                openEditRoleModal(role.id);
            });
            roleCard.querySelector('.delete-role-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteRole(role.id);
            });

            const convSection = document.createElement('div');
            convSection.className = 'conversation-section';
            convSection.innerHTML = `
                <div class="section-title">
                    💬 对话历史
                    <button class="add-conv-btn" data-role="${role.id}">+ 新建</button>
                </div>
                <div class="conv-list" id="conv-list-${role.id}"></div>
            `;
            roleCard.appendChild(convSection);
            roleListDiv.appendChild(roleCard);

            const convContainer = convSection.querySelector(`.conv-list`);
            for (let conv of role.conversations) {
                const convItem = document.createElement('div');
                convItem.className = `conv-item ${currentRoleId === role.id && currentConversationId === conv.id ? 'active' : ''}`;
                convItem.innerHTML = `
                    <span class="conv-name">${escapeHtml(conv.name)}</span>
                    <div class="conv-actions">
                        <button class="rename-conv" data-role="${role.id}" data-conv="${conv.id}">✏️</button>
                        <button class="delete-conv" data-role="${role.id}" data-conv="${conv.id}">🗑️</button>
                    </div>
                `;
                convItem.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    if (currentRoleId === role.id && currentConversationId === conv.id) return;
                    switchConversation(role.id, conv.id);
                });
                convItem.querySelector('.rename-conv').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openRenameModal(role.id, conv.id);
                });
                convItem.querySelector('.delete-conv').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(role.id, conv.id);
                });
                convContainer.appendChild(convItem);
            }
            convSection.querySelector('.add-conv-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                addNewConversation(role.id);
            });
        }
        const curRole = getCurrentRole();
        currentRoleBadge.innerText = curRole ? curRole.name : '无角色';
    }

    function switchRole(roleId) {
        if (currentRoleId === roleId) return;
        currentRoleId = roleId;
        const role = getCurrentRole();
        if (role && role.conversations.length) {
            currentConversationId = role.conversations[0].id;
        } else {
            currentConversationId = null;
        }
        saveData();
        renderSidebar();
        loadConversationToUI();
    }

    function switchConversation(roleId, convId) {
        if (currentRoleId !== roleId) {
            currentRoleId = roleId;
        }
        currentConversationId = convId;
        saveData();
        renderSidebar();
        loadConversationToUI();
    }

    function addMessageToUI(role, content, reasoning = null) {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper';
        if (role === 'user') {
            const userDiv = document.createElement('div');
            userDiv.className = 'user-message';
            userDiv.innerText = content;
            wrapper.appendChild(userDiv);
        } else {
            if (reasoning) {
                const reasoningDiv = document.createElement('div');
                reasoningDiv.className = 'reasoning-content';
                reasoningDiv.innerText = reasoning;
                wrapper.appendChild(reasoningDiv);
            }
            const mainDiv = document.createElement('div');
            mainDiv.className = 'main-content';
            mainDiv.innerText = content;
            wrapper.appendChild(mainDiv);
        }
        messagesArea.appendChild(wrapper);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function loadConversationToUI() {
        messagesArea.innerHTML = '';
        const conv = getCurrentConversation();
        if (conv && conv.messages) {
            for (let msg of conv.messages) {
                addMessageToUI(msg.role, msg.content, msg.reasoning || null);
            }
        } else {
            addMessageToUI('assistant', '选择一个会话开始对话～');
        }
    }

    async function sendMessage(userMessage) {
        const role = getCurrentRole();
        if (!role) { addMessageToUI('assistant', '请先选择一个角色'); return; }
        let conv = getCurrentConversation();
        if (!conv) {
            addNewConversation(currentRoleId);
            conv = getCurrentConversation();
        }
        let messages = conv.messages.filter(m => m.role !== 'system');
        const systemMsg = { role: "system", content: role.systemPrompt };
        const apiMessages = [systemMsg, ...messages, { role: "user", content: userMessage }];
        const requestBody = {
            model: currentModel,
            messages: apiMessages,
            stream: false
        };
        addMessageToUI('user', userMessage);
        const loadingId = 'loading_' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading';
        loadingDiv.id = loadingId;
        loadingDiv.innerText = 'AI 思考中...';
        messagesArea.appendChild(loadingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': CUSTOM_SECRET },
                body: JSON.stringify(requestBody)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const assistantReply = data.choices[0].message.content;
            let reasoning = null;
            if (currentModel === 'deepseek-reasoner' && data.choices[0].message.reasoning_content) {
                reasoning = data.choices[0].message.reasoning_content;
            }
            const updatedMessages = [...messages, 
                { role: "user", content: userMessage, reasoning: null },
                { role: "assistant", content: assistantReply, reasoning: reasoning }
            ];
            conv.messages = updatedMessages;
            saveData();
            document.getElementById(loadingId)?.remove();
            addMessageToUI('assistant', assistantReply, reasoning);
        } catch (err) {
            document.getElementById(loadingId)?.remove();
            addMessageToUI('assistant', `❌ 请求失败: ${err.message}\n请检查 Worker 地址或暗号。`);
        }
    }

    function addNewConversation(roleId) {
        const role = roles.find(r => r.id === roleId);
        if (!role) return;
        const newId = generateId();
        const newConv = {
            id: newId,
            name: `新对话 ${role.conversations.length + 1}`,
            messages: [{ role: 'assistant', content: `你好！我是${role.name}，开始新对话吧～`, reasoning: null }]
        };
        role.conversations.push(newConv);
        saveData();
        if (currentRoleId === roleId) {
            currentConversationId = newId;
            saveData();
        }
        renderSidebar();
        if (currentRoleId === roleId) loadConversationToUI();
    }

    function deleteConversation(roleId, convId) {
        const role = roles.find(r => r.id === roleId);
        if (!role) return;
        if (role.conversations.length <= 1) {
            alert('每个角色至少保留一个对话');
            return;
        }
        role.conversations = role.conversations.filter(c => c.id !== convId);
        if (currentRoleId === roleId && currentConversationId === convId) {
            currentConversationId = role.conversations[0]?.id || null;
        }
        saveData();
        renderSidebar();
        if (currentRoleId === roleId) loadConversationToUI();
    }

    function openRenameModal(roleId, convId) {
        window.renameTarget = { roleId, convId };
        const role = roles.find(r => r.id === roleId);
        const conv = role?.conversations.find(c => c.id === convId);
        if (conv) newConvNameInput.value = conv.name;
        renameConvModal.style.display = 'flex';
    }

    function renameConversation() {
        const { roleId, convId } = window.renameTarget;
        const newName = newConvNameInput.value.trim();
        if (!newName) return;
        const role = roles.find(r => r.id === roleId);
        if (role) {
            const conv = role.conversations.find(c => c.id === convId);
            if (conv) conv.name = newName;
            saveData();
            renderSidebar();
        }
        renameConvModal.style.display = 'none';
    }

    function openEditRoleModal(roleId = null) {
        if (roleId === null) {
            modalTitle.innerText = '新建角色';
            roleNameInput.value = '';
            rolePromptInput.value = '';
            window.editingRoleId = null;
        } else {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;
            modalTitle.innerText = '编辑角色';
            roleNameInput.value = role.name;
            rolePromptInput.value = role.systemPrompt;
            window.editingRoleId = roleId;
        }
        roleModal.style.display = 'flex';
    }

    function saveRole() {
        const name = roleNameInput.value.trim();
        const prompt = rolePromptInput.value.trim();
        if (!name || !prompt) { alert('请填写完整'); return; }
        if (window.editingRoleId) {
            const idx = roles.findIndex(r => r.id === window.editingRoleId);
            if (idx !== -1) {
                roles[idx].name = name;
                roles[idx].systemPrompt = prompt;
            }
        } else {
            const newId = generateId();
            roles.push({ id: newId, name, systemPrompt: prompt, conversations: [] });
            ensureDefaultRoles();
        }
        saveData();
        if (!currentRoleId && roles.length) currentRoleId = roles[0].id;
        renderSidebar();
        if (currentRoleId) loadConversationToUI();
        closeModal();
    }

    function deleteRole(roleId) {
        if (roles.length <= 1) {
            alert('至少保留一个角色，不能删除');
            return;
        }
        if (confirm('删除角色会同时删除其所有对话，确定吗？')) {
            roles = roles.filter(r => r.id !== roleId);
            if (currentRoleId === roleId) {
                currentRoleId = roles[0].id;
                currentConversationId = roles[0].conversations[0]?.id || null;
            }
            saveData();
            renderSidebar();
            loadConversationToUI();
        }
    }

    function closeModal() {
        roleModal.style.display = 'none';
        window.editingRoleId = null;
    }

    function loadTheme() {
        const saved = localStorage.getItem('deepseek_theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            themeToggle.innerHTML = '☀️ 日间模式';
        } else {
            document.body.classList.remove('dark');
            themeToggle.innerHTML = '🌙 夜晚模式';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('deepseek_theme', 'light');
            themeToggle.innerHTML = '🌙 夜晚模式';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('deepseek_theme', 'dark');
            themeToggle.innerHTML = '☀️ 日间模式';
        }
    }
    function onModelChange() {
        currentModel = modelSelect.value;
        saveData();
        addMessageToUI('assistant', `模型已切换为 ${currentModel === 'deepseek-chat' ? '标准对话' : '推理模型'}`);
    }

    // 事件绑定
    sendBtn.addEventListener('click', async () => {
        const text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        await sendMessage(text);
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendBtn.disabled) sendBtn.click();
    });
    addRoleBtn.addEventListener('click', () => openEditRoleModal(null));
    saveRoleBtn.addEventListener('click', saveRole);
    cancelModalBtn.addEventListener('click', closeModal);
    roleModal.addEventListener('click', (e) => { if (e.target === roleModal) closeModal(); });
    modelSelect.addEventListener('change', onModelChange);
    themeToggle.addEventListener('click', toggleTheme);
    confirmRenameBtn.addEventListener('click', renameConversation);
    cancelRenameBtn.addEventListener('click', () => renameConvModal.style.display = 'none');
    renameConvModal.addEventListener('click', (e) => { if (e.target === renameConvModal) renameConvModal.style.display = 'none'; });
    collapseBtn.addEventListener('click', toggleSidebar);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化
    loadData();
    loadTheme();
    loadSidebarState();
    renderSidebar();
    loadConversationToUI();
</script>
</body>
</html>

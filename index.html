<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeepSeek AI · 角色扮演</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 背景层 -->
<div class="dynamic-bg">
    <div id="customBgLayer" class="custom-bg-layer"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
</div>

<div class="app-container">
    <div class="role-sidebar" id="roleSidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <span>角色卡</span>
                <button class="add-role-btn" id="addRoleBtn"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
            </div>
            <div class="role-list" id="roleList"></div>
        </div>
        <!-- 侧边栏底部导入导出与背景设置 -->
        <div class="sidebar-footer">
            <button id="exportBtn" class="action-btn" title="导出">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                导出
            </button>
            <button id="importBtn" class="action-btn" title="导入">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                导入
            </button>
            <button id="bgSettingBtn" class="action-btn" title="设置背景">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                背景
            </button>
            <input type="file" id="importFile" accept=".json" style="display:none">
            <input type="file" id="bgInput" accept="image/*" style="display:none">
        </div>
    </div>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <span id="headerRoleName">DeepSeek</span>
            </div>
            <div class="header-right">
                <div class="model-selector">
                    <select id="modelSelect">
                        <option value="deepseek-v4-flash">V4 Flash</option>
                        <option value="deepseek-v4-pro">V4 Pro</option>
                    </select>
                    <select id="thinkingModeSelect">
                        <option value="fast">快速回答</option>
                        <option value="thinking">深度思考</option>
                    </select>
                </div>
                <button class="theme-toggle" id="themeToggle"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="assistant-message">请从左侧选择一个角色和会话开始</div>
        </div>
        <div class="input-area" id="inputArea">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="在此输入消息，发送给角色..." autocomplete="off" rows="1"></textarea>
                <button id="sendBtn"><svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg></button>
            </div>
        </div>
    </div>
</div>

<div id="roleModal" class="modal"><div class="modal-content role-modal-content"><h3 id="modalTitle">编辑角色</h3>
    <input type="text" id="roleName" placeholder="角色名称">
    <div class="role-mode-toggle">
        <button type="button" id="modeStructuredBtn" class="role-mode-btn active">结构化</button>
        <button type="button" id="modeRawBtn" class="role-mode-btn">自由文本</button>
    </div>
    <div id="roleFields" class="role-fields">
        <label class="field-label">身份背景<span>角色是谁、年龄、身份、外貌关键点</span></label>
        <textarea id="fieldIdentity" class="role-field" rows="3" placeholder="例：林深，28岁，外表清冷的画廊主理人……"></textarea>
        <label class="field-label">性格内核<span>性格、价值观、情绪倾向、底层欲望</span></label>
        <textarea id="fieldPersonality" class="role-field" rows="3" placeholder="例：表面克制疏离，内里固执且占有欲强……"></textarea>
        <label class="field-label">说话方式<span>语气、口头禅、称呼习惯、表达风格</span></label>
        <textarea id="fieldSpeech" class="role-field" rows="3" placeholder="例：话少、句子短，称呼你为「你」，很少用语气词……"></textarea>
        <label class="field-label">用户角色设定<span>「我」在剧情里是谁、身份、与角色的初始距离（选填）</span></label>
        <textarea id="fieldUserPersona" class="role-field" rows="3" placeholder="例：我是新来的策展助理，今天第一天上班，还不认识你……"></textarea>
        <label class="field-label">与「我」的关系<span>和你的关系、对你的态度、隐藏动机</span></label>
        <textarea id="fieldRelationship" class="role-field" rows="3" placeholder="例：是你的旧识，重逢后表面平静，实则一直没放下……"></textarea>
        <label class="field-label">开场场景 / 世界观<span>选填：故事发生的背景设定</span></label>
        <textarea id="fieldScene" class="role-field" rows="3" placeholder="例：雨夜的画廊打烊后，只剩你们两人……"></textarea>
        <label class="field-label">绝不破戒<span>硬性约束：不会做的事、不出戏、不替你做决定</span></label>
        <textarea id="fieldTaboo" class="role-field" rows="3" placeholder="例：不跳出角色解释设定；不替我（用户角色）说话或做决定；保持人设一致……"></textarea>
    </div>
    <textarea id="rolePrompt" placeholder="系统提示词（人设）..." style="display:none;"></textarea>
    <div class="modal-buttons"><button id="cancelModalBtn">取消</button><button id="saveRoleBtn">保存</button></div></div></div>
<div id="renameConvModal" class="modal"><div class="modal-content"><h3>重命名会话</h3><input type="text" id="newConvName" placeholder="新名称"><div class="modal-buttons"><button id="cancelRenameBtn">取消</button><button id="confirmRenameBtn">确定</button></div></div></div>
<div id="editUserMsgModal" class="modal edit-user-modal">
    <div class="modal-content">
        <h3>编辑消息</h3>
        <textarea id="editUserMsgContent" rows="4" placeholder="输入新的消息内容..."></textarea>
        <div class="modal-buttons">
            <button id="cancelEditMsgBtn">取消</button>
            <button id="confirmEditMsgBtn">重新生成</button>
        </div>
    </div>
</div>

<!-- 背景管理弹窗 -->
<div id="bgModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3>自定义背景</h3>
        <div class="bg-grid" id="bgGrid">
            <!-- 动态生成背景列表 -->
        </div>
        <div class="modal-buttons">
            <button id="uploadNewBgBtn" style="background: var(--button-bg); color: var(--button-text); flex: 2;">
                <svg style="width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>上传新图片
            </button>
            <button id="cancelBgModalBtn" style="background: var(--badge-bg); color: var(--text-primary); flex: 1;">关闭</button>
        </div>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>

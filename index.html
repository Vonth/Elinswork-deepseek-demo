<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI · 角色扮演</title>
    <style>
        /* ---------- 全局 CSS 变量 ---------- */
        :root {
            --bg-body: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-chat: #ffffff;
            --border-light: #f0f0f0;
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --text-reasoning: #888;
            --card-active-bg: #fafafa;
            --card-active-border: #eaeaea;
            --input-border: #e0e0e0;
            --button-bg: #2c3e50;
            --button-hover: #1e2b38;
            --badge-bg: #f5f5f5;
            --modal-bg: white;
            --modal-overlay: rgba(0,0,0,0.4);
        }

        body.dark {
            --bg-body: #121212;
            --bg-sidebar: #1e1e2a;
            --bg-chat: #1e1e2a;
            --border-light: #2a2a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --text-reasoning: #aaa;
            --card-active-bg: #2a2a3a;
            --card-active-border: #3a3a4a;
            --input-border: #3a3a4a;
            --button-bg: #3a4c62;
            --button-hover: #2c3e50;
            --badge-bg: #2a2a3a;
            --modal-bg: #2a2a3a;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: background 0.2s, color 0.2s;
            color: var(--text-primary);
        }

        .app-container {
            display: flex;
            flex: 1;
            min-height: 0;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        /* 角色面板 - 二级界面 */
        .role-sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            height: 100%;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        .role-sidebar.open {
            transform: translateX(0);
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 20px 16px;
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }
        .add-role-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .role-list {
            padding: 12px;
        }
        .role-card {
            background: transparent;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .role-card.active {
            background: var(--card-active-bg);
            border-color: var(--card-active-border);
        }
        .role-name {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            color: var(--text-primary);
        }
        .role-preview {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .role-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        .role-actions button {
            background: none;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            background: var(--badge-bg);
            color: var(--text-secondary);
        }
        .conversation-section {
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
            padding-top: 8px;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .add-conv-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .conv-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .conv-item {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .conv-item.active {
            background: var(--card-active-bg);
            border: 1px solid var(--card-active-border);
        }
        .conv-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-actions {
            display: none;
            gap: 6px;
        }
        .conv-item:hover .conv-actions {
            display: flex;
        }
        .conv-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            transition: margin-left 0.3s ease;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .current-role-badge {
            font-size: 0.8rem;
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-primary);
        }
        .model-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        .model-selector select {
            background: var(--badge-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 5px 8px;
            font-size: 0.8rem;
            font-family: inherit;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }
        .theme-toggle {
            background: var(--badge-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 5px 10px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            color: var(--text-primary);
            transition: 0.2s;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .user-message {
            text-align: right;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.4;
            padding: 4px 0;
        }
        .assistant-message {
            text-align: left;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.4;
            padding: 4px 0;
        }
        .reasoning-content {
            font-size: 0.8rem;
            color: var(--text-reasoning);
            background: transparent;
            padding: 8px 0 4px 0;
            margin-bottom: 8px;
            border-left: 2px solid var(--border-light);
            padding-left: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .main-content {
            font-size: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
            background: var(--bg-chat);
        }
        #messageInput {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--input-border);
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-sidebar);
            color: var(--text-primary);
        }
        button {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 8px;
            font-size: 0.8rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            padding: 24px;
            color: var(--text-primary);
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--input-border);
            border-radius: 16px;
            background: var(--bg-sidebar);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
        }
        .modal-content textarea {
            min-height: 280px;
            resize: vertical;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* 浮动折叠按钮 */
        .float-collapse-btn {
            position: fixed;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--button-bg);
            color: white;
            border: none;
            font-size: 20px;
            cursor: grab;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
        }
        .float-collapse-btn:active {
            cursor: grabbing;
        }
        .role-sidebar.open + .float-collapse-btn {
            z-index: 1001;
        }
        .float-collapse-btn:hover {
            background: var(--button-hover);
            transform: scale(1.05);
        }

        /* 消息操作按钮 */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .edit-btn {
            background: #4CAF50;
            color: white;
        }
        .delete-btn {
            background: #f44336;
            color: white;
        }
        .regenerate-btn {
            background: #2196F3;
            color: white;
        }
        .history-btn {
            background: #FF9800;
            color: white;
        }
        .action-btn:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        /* 模态窗口 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--bg-main);
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--text-primary);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .modal-body {
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
        }

        /* 生成历史记录 */
        .regeneration-history {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .regeneration-history h3 {
            margin: 0 0 8px 0;
            color: var(--text-primary);
        }
        .regen-item {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
        }
        .regen-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .regen-content {
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .regen-reasoning {
            font-size: 12px;
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border-color);
        }

        @media (max-width: 700px) {
            body { padding: 12px; }
            .app-container { gap: 12px; }
            .role-sidebar { width: 260px; }
            .role-sidebar.collapsed { width: 32px; }
            .conv-list { max-height: 120px; }
            .float-collapse-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
                bottom: 15px;
                left: 15px;
            }
            .theme-toggle {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="role-sidebar" id="roleSidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <span>🎭 角色卡</span>
                <button class="add-role-btn" id="addRoleBtn">+</button>
            </div>
            <div class="role-list" id="roleList"></div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                🤖 DeepSeek · 角色扮演
                <span class="current-role-badge" id="currentRoleBadge">未选择</span>
            </div>
            <div style="display: flex; gap: 12px;">
                <div class="model-selector">
                    <span>🧠</span>
                    <select id="modelSelect">
                        <option value="deepseek-chat">deepseek-chat (标准)</option>
                        <option value="deepseek-reasoner">deepseek-reasoner (推理)</option>
                    </select>
                </div>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="assistant-message">请从左侧选择一个角色和会话开始～</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<!-- 浮动折叠按钮 -->
<button class="float-collapse-btn" id="floatCollapseBtn">◀</button>

<!-- 编辑角色弹窗 -->
<div id="roleModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">编辑角色</h3>
        <input type="text" id="roleName" placeholder="角色名称">
        <textarea id="rolePrompt" placeholder="系统提示词（人设）..."></textarea>
        <div class="modal-buttons">
            <button id="saveRoleBtn">保存</button>
            <button id="cancelModalBtn">取消</button>
        </div>
    </div>
</div>

<!-- 重命名会话弹窗 -->
<div id="renameConvModal" class="modal">
    <div class="modal-content">
        <h3>重命名会话</h3>
        <input type="text" id="newConvName" placeholder="新名称">
        <div class="modal-buttons">
            <button id="confirmRenameBtn">确定</button>
            <button id="cancelRenameBtn">取消</button>
        </div>
    </div>
</div>

<script>
    // ========== 配置区 ==========
    const WORKER_URL = 'https://still-bread-327a.liaoyilin826.workers.dev/';
    const CUSTOM_SECRET = 'sk-9650ba7fe4e24bb8a600902e30da3ef8';
    // ==========================

    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const roleListDiv = document.getElementById('roleList');
    const currentRoleBadge = document.getElementById('currentRoleBadge');
    const addRoleBtn = document.getElementById('addRoleBtn');
    const roleModal = document.getElementById('roleModal');
    const modalTitle = document.getElementById('modalTitle');
    const roleNameInput = document.getElementById('roleName');
    const rolePromptInput = document.getElementById('rolePrompt');
    const saveRoleBtn = document.getElementById('saveRoleBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const modelSelect = document.getElementById('modelSelect');
    const themeToggle = document.getElementById('themeToggle');
    const renameConvModal = document.getElementById('renameConvModal');
    const newConvNameInput = document.getElementById('newConvName');
    const confirmRenameBtn = document.getElementById('confirmRenameBtn');
    const cancelRenameBtn = document.getElementById('cancelRenameBtn');
    const roleSidebar = document.getElementById('roleSidebar');
    const floatCollapseBtn = document.getElementById('floatCollapseBtn');

    // 数据结构
    let roles = [];
    let currentRoleId = null;
    let currentConversationId = null;
    let currentModel = 'deepseek-chat';

    function generateId() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random();
    }

    // 默认只有一个占位角色
    const defaultRole = {
        id: 'default_role',
        name: '新角色',
        systemPrompt: '你是一个乐于助人的AI助手。',
        conversations: []
    };

    function ensureDefaultRoles() {
        if (!roles || roles.length === 0) {
            roles = [JSON.parse(JSON.stringify(defaultRole))];
        }
        for (let role of roles) {
            if (!role.conversations || role.conversations.length === 0) {
                role.conversations = [{
                    id: generateId(),
                    name: '新对话',
                    messages: [{ role: 'assistant', content: `你好！我是${role.name}，开始对话吧～`, reasoning: null }]
                }];
            }
        }
        saveData();
    }

    function saveData() {
        const data = { roles, currentRoleId, currentConversationId, currentModel };
        localStorage.setItem('deepseek_app_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('deepseek_app_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                roles = data.roles || [];
                currentRoleId = data.currentRoleId || null;
                currentConversationId = data.currentConversationId || null;
                currentModel = data.currentModel || 'deepseek-chat';
                modelSelect.value = currentModel;
            } catch(e) { console.error(e); }
        }
        if (!roles || roles.length === 0) {
            roles = [JSON.parse(JSON.stringify(defaultRole))];
        }
        ensureDefaultRoles();
        if (!roles.find(r => r.id === currentRoleId) && roles.length) currentRoleId = roles[0].id;
        if (currentRoleId) {
            const role = roles.find(r => r.id === currentRoleId);
            if (role && (!currentConversationId || !role.conversations.find(c => c.id === currentConversationId))) {
                currentConversationId = role.conversations[0]?.id || null;
            }
        }
        saveData();
    }

    function getCurrentRole() { return roles.find(r => r.id === currentRoleId); }
    function getCurrentConversation() {
        const role = getCurrentRole();
        if (!role) return null;
        return role.conversations.find(c => c.id === currentConversationId);
    }

    // 角色面板展开收起
    let sidebarOpen = false;
    function loadSidebarState() {
        const saved = localStorage.getItem('sidebar_open');
        if (saved === 'true') {
            sidebarOpen = true;
            roleSidebar.classList.add('open');
            floatCollapseBtn.innerHTML = '✕';
        } else {
            sidebarOpen = false;
            roleSidebar.classList.remove('open');
            floatCollapseBtn.innerHTML = '🎭';
        }
    }
    function toggleSidebar() {
        sidebarOpen = !sidebarOpen;
        if (sidebarOpen) {
            roleSidebar.classList.add('open');
            floatCollapseBtn.innerHTML = '✕';
        } else {
            roleSidebar.classList.remove('open');
            floatCollapseBtn.innerHTML = '🎭';
        }
        localStorage.setItem('sidebar_open', sidebarOpen);
    }

    // 渲染侧边栏
    function renderSidebar() {
        roleListDiv.innerHTML = '';
        for (let role of roles) {
            const roleCard = document.createElement('div');
            roleCard.className = `role-card ${currentRoleId === role.id ? 'active' : ''}`;
            roleCard.innerHTML = `
                <div class="role-name">
                    ${escapeHtml(role.name)}
                    <div class="role-actions">
                        <button class="edit-role-btn" data-id="${role.id}">编辑</button>
                        <button class="delete-role-btn" data-id="${role.id}">删除</button>
                    </div>
                </div>
                <div class="role-preview">${escapeHtml(role.systemPrompt.substring(0, 45))}...</div>
            `;
            roleCard.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                switchRole(role.id);
            });
            roleCard.querySelector('.edit-role-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                openEditRoleModal(role.id);
            });
            roleCard.querySelector('.delete-role-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteRole(role.id);
            });

            const convSection = document.createElement('div');
            convSection.className = 'conversation-section';
            convSection.innerHTML = `
                <div class="section-title">
                    💬 对话历史
                    <button class="add-conv-btn" data-role="${role.id}">+ 新建</button>
                </div>
                <div class="conv-list" id="conv-list-${role.id}"></div>
            `;
            roleCard.appendChild(convSection);
            roleListDiv.appendChild(roleCard);

            const convContainer = convSection.querySelector(`.conv-list`);
            for (let conv of role.conversations) {
                const convItem = document.createElement('div');
                convItem.className = `conv-item ${currentRoleId === role.id && currentConversationId === conv.id ? 'active' : ''}`;
                convItem.innerHTML = `
                    <span class="conv-name">${escapeHtml(conv.name)}</span>
                    <div class="conv-actions">
                        <button class="rename-conv" data-role="${role.id}" data-conv="${conv.id}">✏️</button>
                        <button class="delete-conv" data-role="${role.id}" data-conv="${conv.id}">🗑️</button>
                    </div>
                `;
                convItem.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    if (currentRoleId === role.id && currentConversationId === conv.id) return;
                    switchConversation(role.id, conv.id);
                });
                convItem.querySelector('.rename-conv').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openRenameModal(role.id, conv.id);
                });
                convItem.querySelector('.delete-conv').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(role.id, conv.id);
                });
                convContainer.appendChild(convItem);
            }
            convSection.querySelector('.add-conv-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                addNewConversation(role.id);
            });
        }
        const curRole = getCurrentRole();
        currentRoleBadge.innerText = curRole ? curRole.name : '无角色';
    }

    function switchRole(roleId) {
        if (currentRoleId === roleId) return;
        currentRoleId = roleId;
        const role = getCurrentRole();
        if (role && role.conversations.length) {
            currentConversationId = role.conversations[0].id;
        } else {
            currentConversationId = null;
        }
        saveData();
        renderSidebar();
        loadConversationToUI();
    }

    function switchConversation(roleId, convId) {
        if (currentRoleId !== roleId) {
            currentRoleId = roleId;
        }
        currentConversationId = convId;
        saveData();
        renderSidebar();
        loadConversationToUI();
    }

    function addMessageToUI(role, content, reasoning = null, isLast = false, messageIndex = -1) {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper';
        wrapper.dataset.messageIndex = messageIndex;
        
        if (role === 'user') {
            const userDiv = document.createElement('div');
            userDiv.className = 'user-message';
            userDiv.innerText = content;
            wrapper.appendChild(userDiv);
            
            // 仅为最后一条用户消息添加操作按钮
            if (isLast) {
                const userActions = document.createElement('div');
                userActions.className = 'message-actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'action-btn edit-btn';
                editBtn.innerHTML = '✏️ 编辑';
                editBtn.addEventListener('click', () => editLastUserMessage(content));
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'action-btn delete-btn';
                deleteBtn.innerHTML = '🗑️ 删除';
                deleteBtn.addEventListener('click', deleteLastUserMessage);
                
                userActions.appendChild(editBtn);
                userActions.appendChild(deleteBtn);
                wrapper.appendChild(userActions);
            }
        } else {
            if (reasoning) {
                const reasoningDiv = document.createElement('div');
                reasoningDiv.className = 'reasoning-content';
                reasoningDiv.innerText = reasoning;
                wrapper.appendChild(reasoningDiv);
            }
            const mainDiv = document.createElement('div');
            mainDiv.className = 'main-content';
            mainDiv.innerText = content;
            wrapper.appendChild(mainDiv);
            
            // 为助手消息添加重新生成按钮（如果是最后一条）
            if (isLast) {
                const assistantActions = document.createElement('div');
                assistantActions.className = 'message-actions';
                
                const regenerateBtn = document.createElement('button');
                regenerateBtn.className = 'action-btn regenerate-btn';
                regenerateBtn.innerHTML = '🔄 重新生成';
                regenerateBtn.addEventListener('click', regenerateLastResponse);
                
                const historyBtn = document.createElement('button');
                historyBtn.className = 'action-btn history-btn';
                historyBtn.innerHTML = '📋 历史记录';
                historyBtn.addEventListener('click', () => showRegenerationHistory(messageIndex));
                
                assistantActions.appendChild(regenerateBtn);
                assistantActions.appendChild(historyBtn);
                wrapper.appendChild(assistantActions);
            }
        }
        messagesArea.appendChild(wrapper);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function loadConversationToUI() {
        messagesArea.innerHTML = '';
        const conv = getCurrentConversation();
        if (conv && conv.messages) {
            const messages = conv.messages;
            for (let i = 0; i < messages.length; i++) {
                const msg = messages[i];
                const isLast = (i === messages.length - 1);
                addMessageToUI(msg.role, msg.content, msg.reasoning || null, isLast, i);
            }
        } else {
            addMessageToUI('assistant', '选择一个会话开始对话～');
        }
    }

    async function sendMessage(userMessage, isRegenerate = false, regenerateIndex = 0) {
        const role = getCurrentRole();
        if (!role) { addMessageToUI('assistant', '请先选择一个角色'); return; }
        let conv = getCurrentConversation();
        if (!conv) {
            addNewConversation(currentRoleId);
            conv = getCurrentConversation();
        }
        let messages = conv.messages.filter(m => m.role !== 'system');
        
        // 如果是重新生成，移除最后一条助手消息
        if (isRegenerate && messages.length >= 2) {
            messages = messages.slice(0, -1);
        }
        
        const systemMsg = { role: "system", content: role.systemPrompt };
        const apiMessages = [systemMsg, ...messages, { role: "user", content: userMessage }];
        const requestBody = {
            model: currentModel,
            messages: apiMessages,
            stream: false
        };
        
        // 仅在不是重新生成时添加用户消息
        if (!isRegenerate) {
            addMessageToUI('user', userMessage);
        }
        
        const loadingId = 'loading_' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading';
        loadingDiv.id = loadingId;
        loadingDiv.innerText = isRegenerate ? '重新生成中...' : 'AI 思考中...';
        messagesArea.appendChild(loadingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': CUSTOM_SECRET },
                body: JSON.stringify(requestBody)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const assistantReply = data.choices[0].message.content;
            let reasoning = null;
            if (currentModel === 'deepseek-reasoner' && data.choices[0].message.reasoning_content) {
                reasoning = data.choices[0].message.reasoning_content;
            }
            
            // 构建助手消息对象，包含生成记录
            const assistantMessage = {
                role: "assistant", 
                content: assistantReply, 
                reasoning: reasoning,
                regenerations: [],
                regenerateCount: 0
            };
            
            // 如果是重新生成，更新最后一条助手消息
            let updatedMessages;
            if (isRegenerate && messages.length >= 1) {
                const lastMessage = messages[messages.length - 1];
                if (lastMessage.role === 'assistant') {
                    // 保存当前回复到历史记录
                    lastMessage.regenerations.push({
                        content: lastMessage.content,
                        reasoning: lastMessage.reasoning,
                        timestamp: Date.now()
                    });
                    lastMessage.regenerateCount += 1;
                    lastMessage.content = assistantReply;
                    lastMessage.reasoning = reasoning;
                    updatedMessages = messages;
                } else {
                    updatedMessages = [...messages, assistantMessage];
                }
            } else {
                updatedMessages = [...messages, 
                    { role: "user", content: userMessage, reasoning: null },
                    assistantMessage
                ];
            }
            
            conv.messages = updatedMessages;
            saveData();
            document.getElementById(loadingId)?.remove();
            
            // 重新渲染整个对话
            loadConversationToUI();
        } catch (err) {
            document.getElementById(loadingId)?.remove();
            addMessageToUI('assistant', `❌ 请求失败: ${err.message}\n请检查 Worker 地址或暗号。`);
        }
    }

    function addNewConversation(roleId) {
        const role = roles.find(r => r.id === roleId);
        if (!role) return;
        const newId = generateId();
        const newConv = {
            id: newId,
            name: `新对话 ${role.conversations.length + 1}`,
            messages: [{ role: 'assistant', content: `你好！我是${role.name}，开始新对话吧～`, reasoning: null }]
        };
        role.conversations.push(newConv);
        saveData();
        if (currentRoleId === roleId) {
            currentConversationId = newId;
            saveData();
        }
        renderSidebar();
        if (currentRoleId === roleId) loadConversationToUI();
    }

    function deleteConversation(roleId, convId) {
        const role = roles.find(r => r.id === roleId);
        if (!role) return;
        if (role.conversations.length <= 1) {
            alert('每个角色至少保留一个对话');
            return;
        }
        role.conversations = role.conversations.filter(c => c.id !== convId);
        if (currentRoleId === roleId && currentConversationId === convId) {
            currentConversationId = role.conversations[0]?.id || null;
        }
        saveData();
        renderSidebar();
        if (currentRoleId === roleId) loadConversationToUI();
    }

    function openRenameModal(roleId, convId) {
        window.renameTarget = { roleId, convId };
        const role = roles.find(r => r.id === roleId);
        const conv = role?.conversations.find(c => c.id === convId);
        if (conv) newConvNameInput.value = conv.name;
        renameConvModal.style.display = 'flex';
    }

    function renameConversation() {
        const { roleId, convId } = window.renameTarget;
        const newName = newConvNameInput.value.trim();
        if (!newName) return;
        const role = roles.find(r => r.id === roleId);
        if (role) {
            const conv = role.conversations.find(c => c.id === convId);
            if (conv) conv.name = newName;
            saveData();
            renderSidebar();
        }
        renameConvModal.style.display = 'none';
    }

    function openEditRoleModal(roleId = null) {
        if (roleId === null) {
            modalTitle.innerText = '新建角色';
            roleNameInput.value = '';
            rolePromptInput.value = '';
            window.editingRoleId = null;
        } else {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;
            modalTitle.innerText = '编辑角色';
            roleNameInput.value = role.name;
            rolePromptInput.value = role.systemPrompt;
            window.editingRoleId = roleId;
        }
        roleModal.style.display = 'flex';
    }

    function saveRole() {
        const name = roleNameInput.value.trim();
        const prompt = rolePromptInput.value.trim();
        if (!name || !prompt) { alert('请填写完整'); return; }
        if (window.editingRoleId) {
            const idx = roles.findIndex(r => r.id === window.editingRoleId);
            if (idx !== -1) {
                roles[idx].name = name;
                roles[idx].systemPrompt = prompt;
            }
        } else {
            const newId = generateId();
            roles.push({ id: newId, name, systemPrompt: prompt, conversations: [] });
            ensureDefaultRoles();
        }
        saveData();
        if (!currentRoleId && roles.length) currentRoleId = roles[0].id;
        renderSidebar();
        if (currentRoleId) loadConversationToUI();
        closeModal();
    }

    function deleteRole(roleId) {
        if (roles.length <= 1) {
            alert('至少保留一个角色，不能删除');
            return;
        }
        if (confirm('删除角色会同时删除其所有对话，确定吗？')) {
            roles = roles.filter(r => r.id !== roleId);
            if (currentRoleId === roleId) {
                currentRoleId = roles[0].id;
                currentConversationId = roles[0].conversations[0]?.id || null;
            }
            saveData();
            renderSidebar();
            loadConversationToUI();
        }
    }

    function closeModal() {
        roleModal.style.display = 'none';
        window.editingRoleId = null;
    }

    function loadTheme() {
        const saved = localStorage.getItem('deepseek_theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            themeToggle.innerHTML = '☀️';
        } else {
            document.body.classList.remove('dark');
            themeToggle.innerHTML = '🌙';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('deepseek_theme', 'light');
            themeToggle.innerHTML = '🌙';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('deepseek_theme', 'dark');
            themeToggle.innerHTML = '☀️';
        }
    }
    function onModelChange() {
        currentModel = modelSelect.value;
        saveData();
        addMessageToUI('assistant', `模型已切换为 ${currentModel === 'deepseek-chat' ? '标准对话' : '推理模型'}`);
    }

    // 事件绑定
    sendBtn.addEventListener('click', async () => {
        const text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        await sendMessage(text);
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendBtn.disabled) sendBtn.click();
    });
    addRoleBtn.addEventListener('click', () => openEditRoleModal(null));
    saveRoleBtn.addEventListener('click', saveRole);
    cancelModalBtn.addEventListener('click', closeModal);
    roleModal.addEventListener('click', (e) => { if (e.target === roleModal) closeModal(); });
    modelSelect.addEventListener('change', onModelChange);
    themeToggle.addEventListener('click', toggleTheme);
    confirmRenameBtn.addEventListener('click', renameConversation);
    cancelRenameBtn.addEventListener('click', () => renameConvModal.style.display = 'none');
    renameConvModal.addEventListener('click', (e) => { if (e.target === renameConvModal) renameConvModal.style.display = 'none'; });
    floatCollapseBtn.addEventListener('click', toggleSidebar);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 拖拽功能
    let isDragging = false;
    let startX, startY, startLeft, startTop;

    function initDraggableButton() {
        const btn = document.getElementById('floatCollapseBtn');
        
        // 加载保存的位置
        loadButtonPosition();
        
        btn.addEventListener('mousedown', startDrag);
        btn.addEventListener('touchstart', startDrag, { passive: false });
        
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }

    function startDrag(e) {
        isDragging = true;
        const btn = document.getElementById('floatCollapseBtn');
        
        if (e.type === 'mousedown') {
            startX = e.clientX;
            startY = e.clientY;
        } else if (e.type === 'touchstart') {
            e.preventDefault();
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }
        
        startLeft = parseInt(btn.style.left) || 20;
        startTop = parseInt(btn.style.top) || (window.innerHeight - 68);
    }

    function drag(e) {
        if (!isDragging) return;
        
        e.preventDefault();
        const btn = document.getElementById('floatCollapseBtn');
        let clientX, clientY;
        
        if (e.type === 'mousemove') {
            clientX = e.clientX;
            clientY = e.clientY;
        } else if (e.type === 'touchmove') {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        
        const deltaX = clientX - startX;
        const deltaY = clientY - startY;
        
        let newLeft = startLeft + deltaX;
        let newTop = startTop + deltaY;
        
        // 限制在视窗内
        newLeft = Math.max(10, Math.min(newLeft, window.innerWidth - 58));
        newTop = Math.max(10, Math.min(newTop, window.innerHeight - 58));
        
        btn.style.left = newLeft + 'px';
        btn.style.top = newTop + 'px';
    }

    function endDrag() {
        if (isDragging) {
            isDragging = false;
            saveButtonPosition();
        }
    }

    function saveButtonPosition() {
        const btn = document.getElementById('floatCollapseBtn');
        const position = {
            left: btn.style.left,
            top: btn.style.top
        };
        localStorage.setItem('float_button_position', JSON.stringify(position));
    }

    function loadButtonPosition() {
        const saved = localStorage.getItem('float_button_position');
        if (saved) {
            try {
                const position = JSON.parse(saved);
                const btn = document.getElementById('floatCollapseBtn');
                btn.style.left = position.left || '20px';
                btn.style.top = position.top || (window.innerHeight - 68) + 'px';
            } catch (e) {
                console.error('Failed to load button position:', e);
                resetButtonPosition();
            }
        } else {
            resetButtonPosition();
        }
    }

    function resetButtonPosition() {
        const btn = document.getElementById('floatCollapseBtn');
        btn.style.left = '20px';
        btn.style.top = (window.innerHeight - 68) + 'px';
    }

    // 编辑最后一条用户消息
    function editLastUserMessage(currentContent) {
        const newContent = prompt('编辑你的消息:', currentContent);
        if (newContent !== null && newContent.trim() !== '') {
            const conv = getCurrentConversation();
            if (conv && conv.messages) {
                // 找到最后一条用户消息
                for (let i = conv.messages.length - 1; i >= 0; i--) {
                    if (conv.messages[i].role === 'user') {
                        conv.messages[i].content = newContent.trim();
                        saveData();
                        loadConversationToUI();
                        break;
                    }
                }
            }
        }
    }

    // 删除最后一条用户消息
    function deleteLastUserMessage() {
        if (confirm('确定要删除最后一条消息吗？')) {
            const conv = getCurrentConversation();
            if (conv && conv.messages) {
                // 找到最后一条用户消息并删除
                for (let i = conv.messages.length - 1; i >= 0; i--) {
                    if (conv.messages[i].role === 'user') {
                        conv.messages.splice(i, 1);
                        // 同时删除后续的助手消息
                        if (i < conv.messages.length && conv.messages[i].role === 'assistant') {
                            conv.messages.splice(i, 1);
                        }
                        saveData();
                        loadConversationToUI();
                        break;
                    }
                }
            }
        }
    }

    // 重新生成最后一条回复
    async function regenerateLastResponse() {
        const conv = getCurrentConversation();
        if (conv && conv.messages) {
            // 找到最后一条助手消息
            let assistantMessageIndex = -1;
            let userMessageIndex = -1;
            
            for (let i = conv.messages.length - 1; i >= 0; i--) {
                if (conv.messages[i].role === 'assistant') {
                    assistantMessageIndex = i;
                    // 检查重新生成次数
                    const assistantMessage = conv.messages[i];
                    if (assistantMessage.regenerateCount >= 4) { // 0-4共5次
                        alert('已达到最大重新生成次数（5次）');
                        return;
                    }
                } else if (conv.messages[i].role === 'user') {
                    userMessageIndex = i;
                    break;
                }
            }
            
            if (userMessageIndex !== -1) {
                const userMessage = conv.messages[userMessageIndex].content;
                await sendMessage(userMessage, true);
            }
        }
    }

    // 显示重新生成历史记录
    function showRegenerationHistory(messageIndex) {
        const conv = getCurrentConversation();
        if (conv && conv.messages && messageIndex >= 0 && messageIndex < conv.messages.length) {
            const message = conv.messages[messageIndex];
            if (message.role === 'assistant' && message.regenerations && message.regenerations.length > 0) {
                let historyHTML = '<div class="regeneration-history">';
                historyHTML += '<h3>生成历史记录</h3>';
                
                message.regenerations.forEach((regen, index) => {
                    const date = new Date(regen.timestamp);
                    const time = date.toLocaleTimeString();
                    historyHTML += `<div class="regen-item">
                        <div class="regen-time">${time} (第${index + 1}次)</div>
                        <div class="regen-content">${regen.content}</div>
                        ${regen.reasoning ? `<div class="regen-reasoning">${regen.reasoning}</div>` : ''}
                    </div>`;
                });
                
                historyHTML += '</div>';
                
                // 创建弹出窗口
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>生成历史</h2>
                            <button class="modal-close">✕</button>
                        </div>
                        <div class="modal-body">${historyHTML}</div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // 关闭按钮事件
                modal.querySelector('.modal-close').addEventListener('click', () => {
                    modal.remove();
                });
                
                // 点击外部关闭
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.remove();
                    }
                });
            } else {
                alert('没有生成历史记录');
            }
        }
    }

    // 初始化
    loadData();
    loadTheme();
    loadSidebarState();
    renderSidebar();
    loadConversationToUI();
    initDraggableButton();
</script>
</body>
</html>

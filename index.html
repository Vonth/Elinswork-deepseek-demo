<!DOCTYPE html>

 <html lang="zh-CN">

 <head>

     <meta charset="UTF-8">

     <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

     <title>DeepSeek AI 助手</title>

     <style>

         * { margin: 0; padding: 0; box-sizing: border-box; }

         body {

             background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

             font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

             height: 100vh;

             display: flex;

             justify-content: center;

             align-items: center;

             padding: 20px;

         }

         .chat-container {

             width: 100%;

             max-width: 800px;

             height: 90vh;

             background: white;

             border-radius: 28px;

             box-shadow: 0 20px 60px rgba(0,0,0,0.3);

             display: flex;

             flex-direction: column;

             overflow: hidden;

         }

         .chat-header {

             background: #1a1a2e;

             color: white;

             padding: 20px;

             text-align: center;

             font-size: 1.2rem;

             font-weight: 600;

         }

         .messages-area {

             flex: 1;

             overflow-y: auto;

             padding: 20px;

             display: flex;

             flex-direction: column;

             gap: 15px;

         }

         .message {

             display: flex;

             margin-bottom: 10px;

         }

         .user-message { justify-content: flex-end; }

         .assistant-message { justify-content: flex-start; }

         .message-bubble {

             max-width: 75%;

             padding: 12px 16px;

             border-radius: 20px;

             line-height: 1.4;

             word-wrap: break-word;

         }

         .user-message .message-bubble {

             background: #667eea;

             color: white;

             border-bottom-right-radius: 4px;

         }

         .assistant-message .message-bubble {

             background: #f0f2f5;

             color: #1a1a2e;

             border-bottom-left-radius: 4px;

         }

         .input-area {

             padding: 15px 20px;

             background: white;

             border-top: 1px solid #e0e0e0;

             display: flex;

             gap: 10px;

         }

         #messageInput {

             flex: 1;

             padding: 12px 16px;

             border: 1px solid #ddd;

             border-radius: 25px;

             font-size: 1rem;

             outline: none;

             transition: border-color 0.3s;

             font-family: inherit;

         }

         #messageInput:focus { border-color: #667eea; }

         button {

             background: #667eea;

             color: white;

             border: none;

             padding: 0 20px;

             border-radius: 25px;

             font-size: 1rem;

             font-weight: 600;

             cursor: pointer;

             transition: background 0.3s;

         }

         button:hover { background: #5a67d8; }

         button:disabled {

             background: #aaa;

             cursor: not-allowed;

         }

         .loading {

             text-align: center;

             color: #666;

             padding: 10px;

             font-style: italic;

         }

         @media (max-width: 600px) {

             body { padding: 10px; }

             .chat-container { height: 95vh; }

             .message-bubble { max-width: 85%; }

         }

     </style>

 </head>

 <body>

 <div class="chat-container">

     <div class="chat-header">

         🤖 DeepSeek AI 助手

     </div>

     <div class="messages-area" id="messagesArea">

         <div class="message assistant-message">

             <div class="message-bubble">你好！我是DeepSeek AI助手，有什么可以帮你的吗？</div>

         </div>

     </div>

     <div class="input-area">

         <input type="text" id="messageInput" placeholder="输入你的问题..." autocomplete="off">

         <button id="sendBtn">发送</button>

     </div>

 </div>

  

 <script>

     // 初始化界面元素

     const messagesArea = document.getElementById('messagesArea');

     const messageInput = document.getElementById('messageInput');

     const sendBtn = document.getElementById('sendBtn');

  

     // ========== 请在此处配置你的API Key ==========

     const API_KEY = '你的DeepSeek API Key';  // 🔴 替换成你自己的API Key

     // ==========================================

  

     const API_URL = 'https://api.deepseek.com/v1/chat/completions';

      

     // 对话历史（用于多轮对话）

     let conversationHistory = [

         { role: "system", content: "你是一个乐于助人的AI助手。" }

     ];

  

     // 添加消息到界面

     function addMessage(role, content) {

         const messageDiv = document.createElement('div');

         messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;

         const bubble = document.createElement('div');

         bubble.className = 'message-bubble';

         bubble.innerText = content;

         messageDiv.appendChild(bubble);

         messagesArea.appendChild(messageDiv);

         messagesArea.scrollTop = messagesArea.scrollHeight;

     }

  

     // 显示加载状态

     function showLoading() {

         const loadingDiv = document.createElement('div');

         loadingDiv.className = 'loading';

         loadingDiv.id = 'loadingIndicator';

         loadingDiv.innerText = 'AI正在思考...';

         messagesArea.appendChild(loadingDiv);

         messagesArea.scrollTop = messagesArea.scrollHeight;

     }

  

     function hideLoading() {

         const loading = document.getElementById('loadingIndicator');

         if (loading) loading.remove();

     }

  

     // 调用DeepSeek API

    async function callDeepSeekAPI(userMessage) {

        // 将用户消息添加到历史

        conversationHistory.push({ role: "user", content: userMessage });

         

        const requestBody = {

            model: "deepseek-chat",

            messages: conversationHistory,

            stream: false

        };

 

        try {

            // ⚠️ 重要：把下面的网址换成你自己的 Cloudflare Worker 地址

            const WORKER_URL = 'https://still-bread-327a.liaoyilin826.workers.dev/';

            // ⚠️ 重要：把下面的暗号换成你在 Worker 里设置的 VALID_SECRET

            const CUSTOM_SECRET = 'xK9mP2vL7qR4nF8t';

 

            const response = await fetch(WORKER_URL, {

                method: 'POST',

                headers: {

                    'Content-Type': 'application/json',

                    'X-API-Key': CUSTOM_SECRET   // ← 自定义请求头

                },

                body: JSON.stringify(requestBody)

            });

 

            if (!response.ok) {

                const errorText = await response.text();

                throw new Error(`请求失败 (${response.status}): ${errorText}`);

            }

 

            const data = await response.json();

            const assistantMessage = data.choices[0].message.content;

             

            // 将助手回复添加到历史

            conversationHistory.push({ role: "assistant", content: assistantMessage });

             

            return assistantMessage;

        } catch (error) {

            console.error('调用API失败:', error);

            return `❌ 出错了: ${error.message}\n\n请检查网络或联系管理员。`;

        }

    }

     // 发送消息

    async function sendMessage() {

        const message = messageInput.value.trim();

        if (!message) return;

 

        // 清空输入框

        messageInput.value = '';

        // 显示用户消息

        addMessage('user', message);

        // 显示加载状态

        showLoading();

        // 禁用发送按钮

        sendBtn.disabled = true;

        // 调用API

        try {
            const assistantResponse = await callDeepSeekAPI(message);
            addMessage('assistant', assistantResponse);
        } finally {
            hideLoading();
            sendBtn.disabled = false;
        }

    }

     // 绑定事件

     sendBtn.addEventListener('click', sendMessage);

     messageInput.addEventListener('keypress', (e) => {

         if (e.key === 'Enter') sendMessage();

     });

 </script>

 </body>

 </html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI · 角色扮演</title>
    <style>
        /* ---------- 全局 CSS 变量（日间模式默认） ---------- */
        :root {
            --bg-body: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-chat: #ffffff;
            --border-light: #f0f0f0;
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --card-active-bg: #fafafa;
            --card-active-border: #eaeaea;
            --bubble-user-bg: #f2f2f2;
            --bubble-user-text: #1a1a2e;
            --bubble-assistant-bg: #ffffff;
            --bubble-assistant-border: #eaeaea;
            --bubble-assistant-text: #1a1a2e;
            --input-border: #e0e0e0;
            --button-bg: #2c3e50;
            --button-hover: #1e2b38;
            --badge-bg: #f5f5f5;
            --modal-bg: white;
            --modal-overlay: rgba(0,0,0,0.4);
        }

        body.dark {
            --bg-body: #121212;
            --bg-sidebar: #1e1e2a;
            --bg-chat: #1e1e2a;
            --border-light: #2a2a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --card-active-bg: #2a2a3a;
            --card-active-border: #3a3a4a;
            --bubble-user-bg: #2c2c3e;
            --bubble-user-text: #e0e0e0;
            --bubble-assistant-bg: #1e1e2a;
            --bubble-assistant-border: #3a3a4a;
            --bubble-assistant-text: #e0e0e0;
            --input-border: #3a3a4a;
            --button-bg: #3a4c62;
            --button-hover: #2c3e50;
            --badge-bg: #2a2a3a;
            --modal-bg: #2a2a3a;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: background 0.2s, color 0.2s;
            color: var(--text-primary);
        }

        .app-container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 角色侧边栏 (包含会话列表) */
        .role-sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            transition: background 0.2s;
        }

        .sidebar-header {
            padding: 20px 16px;
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }

        .add-role-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: var(--text-primary);
        }

        .add-role-btn:hover {
            background: var(--card-active-bg);
        }

        .role-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .role-card {
            background: transparent;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .role-card.active {
            background: var(--card-active-bg);
            border-color: var(--card-active-border);
        }

        .role-name {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            color: var(--text-primary);
        }

        .role-preview {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .role-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .role-actions button {
            background: none;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            background: var(--badge-bg);
            color: var(--text-secondary);
        }

        /* 会话列表 (属于当前角色) */
        .conversation-section {
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
            padding-top: 8px;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-conv-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .conv-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .conv-item {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .conv-item.active {
            background: var(--card-active-bg);
            border: 1px solid var(--card-active-border);
        }

        .conv-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-actions {
            display: none;
            gap: 6px;
        }

        .conv-item:hover .conv-actions {
            display: flex;
        }

        .conv-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            transition: background 0.2s;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .current-role-badge {
            font-size: 0.8rem;
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-primary);
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }
        .model-selector select {
            background: var(--badge-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }

        .theme-toggle {
            background: var(--badge-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            transition: 0.2s;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
        }

        .user-message { justify-content: flex-end; }
        .assistant-message { justify-content: flex-start; }

        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 0.9rem;
        }

        .user-message .message-bubble {
            background: var(--bubble-user-bg);
            color: var(--bubble-user-text);
        }

        .assistant-message .message-bubble {
            background: var(--bubble-assistant-bg);
            border: 1px solid var(--bubble-assistant-border);
            color: var(--bubble-assistant-text);
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
            background: var(--bg-chat);
        }

        #messageInput {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--input-border);
            border-radius: 30px;
            font-size: 0.9rem;
            outline: none;
            background: var(--bg-sidebar);
            color: var(--text-primary);
        }

        button {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 8px;
            font-size: 0.8rem;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 480px;
            border-radius: 24px;
            padding: 24px;
            color: var(--text-primary);
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--input-border);
            border-radius: 16px;
            background: var(--bg-sidebar);
            color: var(--text-primary);
            font-family: inherit;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        @media (max-width: 700px) {
            body { padding: 12px; }
            .app-container { flex-direction: column; }
            .role-sidebar { width: 100%; max-height: 45%; }
            .conv-list { max-height: 120px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="role-sidebar">
        <div class="sidebar-header">
            🎭 角色卡
            <button class="add-role-btn" id="addRoleBtn">+</button>
        </div>
        <div class="role-list" id="roleList"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                🤖 DeepSeek · 角色扮演
                <span class="current-role-badge" id="currentRoleBadge">未选择</span>
            </div>
            <div style="display: flex; gap: 12px;">
                <div class="model-selector">
                    <span>🧠 模型：</span>
                    <select id="modelSelect">
                        <option value="deepseek-chat">deepseek-chat (标准)</option>
                        <option value="deepseek-reasoner">deepseek-reasoner (推理)</option>
                    </select>
                </div>
                <button class="theme-toggle" id="themeToggle">🌙 夜晚模式</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="message assistant-message">
                <div class="message-bubble">请从左侧选择一个角色和会话开始～</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<!-- 编辑角色弹窗 -->
<div id="roleModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">编辑角色</h3>
        <input type="text" id="roleName" placeholder="角色名称">
        <textarea id="rolePrompt" placeholder="系统提示词（人设）..."></textarea>
        <div class="modal-buttons">
            <button id="saveRoleBtn">保存</button>
            <button id="cancelModalBtn">取消</button>
        </div>
    </div>
</div>

<!-- 重命名会话弹窗 -->
<div id="renameConvModal" class="modal">
    <div class="modal-content">
        <h3>重命名会话</h3>
        <input type="text" id="newConvName" placeholder="新名称">
        <div class="modal-buttons">
            <button id="confirmRenameBtn">确定</button>
            <button id="cancelRenameBtn">取消</button>
        </div>
    </div>
</div>

<script>
    // ========== 配置区 ==========
    const WORKER_URL = 'https://still-bread-327a.liaoyilin826.workers.dev/';
    const CUSTOM_SECRET = 'xK9mP2vL7qR4nF8t';
    // ==========================

    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const roleListDiv = document.getElementById('roleList');
    const currentRoleBadge = document.getElementById('currentRoleBadge');
    const addRoleBtn = document.getElementById('addRoleBtn');
    const roleModal = document.getElementById('roleModal');
    const modalTitle = document.getElementById('modalTitle');
    const roleNameInput = document.getElementById('roleName');
    const rolePromptInput = document.getElementById('rolePrompt');
    const saveRoleBtn = document.getElementById('saveRoleBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const modelSelect = document.getElementById('modelSelect');
    const themeToggle = document.getElementById('themeToggle');
    const renameConvModal = document.getElementById('renameConvModal');
    const newConvNameInput = document.getElementById('newConvName');
    const confirmRenameBtn = document.getElementById('confirmRenameBtn');
    const cancelRenameBtn = document.getElementById('cancelRenameBtn');

    // 数据结构
    let roles = [];                // { id, name, systemPrompt, conversations: [ { id, name, messages } ] }
    let currentRoleId = null;
    let currentConversationId = null;
    let currentModel = 'deepseek-chat';

    // 辅助函数
    function generateId() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random();
    }

    // 默认角色数据
    const defaultRoles = [
        { id: 'role_1', name: '📜 渊明居士', systemPrompt: '你是一位隐居山林的古代文人...', conversations: [] },
        { id: 'role_2', name: '🔧 赛博技师', systemPrompt: '你是22世纪的赛博朋克技师...', conversations: [] },
        { id: 'role_3', name: '🐉 龙族长老', systemPrompt: '你是一头活了上千年的龙族长老...', conversations: [] }
    ];

    // 初始化默认会话（每个角色至少一个默认会话）
    function ensureDefaultConversations() {
        for (let role of roles) {
            if (!role.conversations || role.conversations.length === 0) {
                role.conversations = [{
                    id: generateId(),
                    name: '新对话',
                    messages: [{ role: 'assistant', content: `你好！我是${role.name}，开始对话吧～` }]
                }];
            }
        }
        saveData();
    }

    // 存储全部数据
    function saveData() {
        const data = { roles, currentRoleId, currentConversationId, currentModel };
        localStorage.setItem('deepseek_app_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('deepseek_app_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                roles = data.roles || [];
                currentRoleId = data.currentRoleId || null;
                currentConversationId = data.currentConversationId || null;
                currentModel = data.currentModel || 'deepseek-chat';
                modelSelect.value = currentModel;
            } catch(e) { console.error(e); }
        }
        if (!roles || roles.length === 0) {
            roles = JSON.parse(JSON.stringify(defaultRoles));
            ensureDefaultConversations();
        } else {
            ensureDefaultConversations();
        }
        // 修复旧数据格式（如果 messages 不存在）
        for (let role of roles) {
            if (role.conversations) {
                for (let conv of role.conversations) {
                    if (!conv.messages) conv.messages = [];
                    if (conv.messages.length === 0) {
                        conv.messages = [{ role: 'assistant', content: `你好！我是${role.name}，开始对话吧～` }];
                    }
                }
            } else {
                role.conversations = [{
                    id: generateId(),
                    name: '新对话',
                    messages: [{ role: 'assistant', content: `你好！我是${role.name}，开始对话吧～` }]
                }];
            }
        }
        // 确保 currentRoleId 有效
        if (!roles.find(r => r.id === currentRoleId) && roles.length) currentRoleId = roles[0].id;
        if (currentRoleId) {
            const role = roles.find(r => r.id === currentRoleId);
            if (role && (!currentConversationId || !role.conversations.find(c => c.id === currentConversationId))) {
                currentConversationId = role.conversations[0]?.id || null;
            }
        }
        saveData();
    }

    function getCurrentRole() { return roles.find(r => r.id === currentRoleId); }
    function getCurrentConversation() {
        const role = getCurrentRole();
        if (!role) return null;
        return role.conversations.find(c => c.id === currentConversationId);
    }

    // 渲染左侧：角色卡片 + 会话列表
    function renderSidebar() {
        roleListDiv.innerHTML = '';
        for (let role of roles) {
            const roleCard = document.createElement('div');
            roleCard.className = `role-card ${currentRoleId === role.id ? 'active' : ''}`;
            roleCard.innerHTML = `
                <div class="role-name">
                    ${escapeHtml(role.name)}
                    <div class="role-actions">
                        <button class="edit-role-btn" data-id="${role.id}">编辑</button>
                        <button class="delete-role-btn" data-id="${role.id}">删除</button>
                    </div>
                </div>
                <div class="role-preview">${escapeHtml(role.systemPrompt.substring(0, 45))}...</div>
            `;
            roleCard.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                switchRole(role.id);
            });
            roleCard.querySelector('.edit-role-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                openEditRoleModal(role.id);
            });
            roleCard.querySelector('.delete-role-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteRole(role.id);
            });

            // 会话列表区域
            const convSection = document.createElement('div');
            convSection.className = 'conversation-section';
            convSection.innerHTML = `
                <div class="section-title">
                    💬 对话历史
                    <button class="add-conv-btn" data-role="${role.id}">+ 新建</button>
                </div>
                <div class="conv-list" id="conv-list-${role.id}"></div>
            `;
            roleCard.appendChild(convSection);
            roleListDiv.appendChild(roleCard);

            // 渲染该角色下的会话列表
            const convContainer = convSection.querySelector(`.conv-list`);
            for (let conv of role.conversations) {
                const convItem = document.createElement('div');
                convItem.className = `conv-item ${currentRoleId === role.id && currentConversationId === conv.id ? 'active' : ''}`;
                convItem.innerHTML = `
                    <span class="conv-name">${escapeHtml(conv.name)}</span>
                    <div class="conv-actions">
                        <button class="rename-conv" data-role="${role.id}" data-conv="${conv.id}">✏️</button>
                        <button class="delete-conv" data-role="${role.id}" data-conv="${conv.id}">🗑️</button>
                    </div>
                `;
                convItem.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    if (currentRoleId === role.id && currentConversationId === conv.id) return;
                    switchConversation(role.id, conv.id);
                });
                convItem.querySelector('.rename-conv').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openRenameModal(role.id, conv.id);
                });
                convItem.querySelector('.delete-conv').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(role.id, conv.id);
                });
                convContainer.appendChild(convItem);
            }

            // 新建会话按钮
            convSection.querySelector('.add-conv-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                addNewConversation(role.id);
            });
        }
        const curRole = getCurrentRole();
        currentRoleBadge.innerText = curRole ? curRole.name : '无角色';
    }

    function switchRole(roleId) {
        if (currentRoleId === roleId) return;
        currentRoleId = roleId;
        const role = getCurrentRole();
        if (role && role.conversations.length) {
            currentConversationId = role.conversations[0].id;
        } else {
            currentConversationId = null;
        }
        saveData();
        renderSidebar();
        loadConversationToUI();
    }

    function switchConversation(roleId, convId) {
        if (currentRoleId !== roleId) {
            currentRoleId = roleId;
        }
        currentConversationId = convId;
        saveData();
        renderSidebar();
        loadConversationToUI();
    }

    function loadConversationToUI() {
        const conv = getCurrentConversation();
        messagesArea.innerHTML = '';
        if (conv && conv.messages) {
            for (let msg of conv.messages) {
                addMessageToUI(msg.role, msg.content);
            }
        } else {
            addMessageToUI('assistant', '选择一个会话开始对话～');
        }
    }

    function addMessageToUI(role, content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerText = content;
        messageDiv.appendChild(bubble);
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // 保存当前会话的消息到 localStorage
    function saveCurrentConversationMessages(messages) {
        const role = getCurrentRole();
        if (!role) return;
        const conv = role.conversations.find(c => c.id === currentConversationId);
        if (conv) {
            conv.messages = messages;
            saveData();
        }
    }

    async function sendMessage(userMessage) {
        const role = getCurrentRole();
        if (!role) { addMessageToUI('assistant', '请先选择一个角色'); return; }
        let conv = getCurrentConversation();
        if (!conv) {
            // 自动创建新会话
            addNewConversation(currentRoleId);
            conv = getCurrentConversation();
        }
        // 当前消息列表
        let messages = conv.messages.filter(m => m.role !== 'system'); // 不包含 system 提示
        // 构造给 API 的完整消息：system + 历史 + 新消息
        const systemMsg = { role: "system", content: role.systemPrompt };
        const apiMessages = [systemMsg, ...messages, { role: "user", content: userMessage }];
        const requestBody = {
            model: currentModel,
            messages: apiMessages,
            stream: false
        };
        // 立即在 UI 显示用户消息
        addMessageToUI('user', userMessage);
        // 添加临时 loading
        const loadingId = 'loading_' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading';
        loadingDiv.id = loadingId;
        loadingDiv.innerText = 'AI 思考中...';
        messagesArea.appendChild(loadingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': CUSTOM_SECRET },
                body: JSON.stringify(requestBody)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const assistantReply = data.choices[0].message.content;
            // 更新本地消息列表
            const updatedMessages = [...messages, { role: "user", content: userMessage }, { role: "assistant", content: assistantReply }];
            conv.messages = updatedMessages;
            saveData();
            // 移除 loading
            document.getElementById(loadingId)?.remove();
            addMessageToUI('assistant', assistantReply);
        } catch (err) {
            document.getElementById(loadingId)?.remove();
            addMessageToUI('assistant', `❌ 请求失败: ${err.message}\n请检查 Worker 地址或暗号。`);
        }
    }

    function addNewConversation(roleId) {
        const role = roles.find(r => r.id === roleId);
        if (!role) return;
        const newId = generateId();
        const newConv = {
            id: newId,
            name: `新对话 ${role.conversations.length + 1}`,
            messages: [{ role: 'assistant', content: `你好！我是${role.name}，开始新对话吧～` }]
        };
        role.conversations.push(newConv);
        saveData();
        if (currentRoleId === roleId) {
            currentConversationId = newId;
            saveData();
        }
        renderSidebar();
        if (currentRoleId === roleId) loadConversationToUI();
    }

    function deleteConversation(roleId, convId) {
        const role = roles.find(r => r.id === roleId);
        if (!role) return;
        if (role.conversations.length <= 1) {
            alert('每个角色至少保留一个对话');
            return;
        }
        role.conversations = role.conversations.filter(c => c.id !== convId);
        if (currentRoleId === roleId && currentConversationId === convId) {
            currentConversationId = role.conversations[0]?.id || null;
        }
        saveData();
        renderSidebar();
        if (currentRoleId === roleId) loadConversationToUI();
    }

    function openRenameModal(roleId, convId) {
        window.renameTarget = { roleId, convId };
        const role = roles.find(r => r.id === roleId);
        const conv = role?.conversations.find(c => c.id === convId);
        if (conv) newConvNameInput.value = conv.name;
        renameConvModal.style.display = 'flex';
    }

    function renameConversation() {
        const { roleId, convId } = window.renameTarget;
        const newName = newConvNameInput.value.trim();
        if (!newName) return;
        const role = roles.find(r => r.id === roleId);
        if (role) {
            const conv = role.conversations.find(c => c.id === convId);
            if (conv) conv.name = newName;
            saveData();
            renderSidebar();
        }
        renameConvModal.style.display = 'none';
    }

    // 角色编辑
    function openEditRoleModal(roleId = null) {
        if (roleId === null) {
            modalTitle.innerText = '新建角色';
            roleNameInput.value = '';
            rolePromptInput.value = '';
            window.editingRoleId = null;
        } else {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;
            modalTitle.innerText = '编辑角色';
            roleNameInput.value = role.name;
            rolePromptInput.value = role.systemPrompt;
            window.editingRoleId = roleId;
        }
        roleModal.style.display = 'flex';
    }

    function saveRole() {
        const name = roleNameInput.value.trim();
        const prompt = rolePromptInput.value.trim();
        if (!name || !prompt) { alert('请填写完整'); return; }
        if (window.editingRoleId) {
            const idx = roles.findIndex(r => r.id === window.editingRoleId);
            if (idx !== -1) {
                roles[idx].name = name;
                roles[idx].systemPrompt = prompt;
            }
        } else {
            const newId = generateId();
            roles.push({ id: newId, name, systemPrompt: prompt, conversations: [] });
            ensureDefaultConversations();
        }
        saveData();
        if (!currentRoleId && roles.length) currentRoleId = roles[0].id;
        renderSidebar();
        if (currentRoleId) loadConversationToUI();
        closeModal();
    }

    function deleteRole(roleId) {
        if (roles.length <= 1) { alert('至少保留一个角色'); return; }
        if (confirm('删除角色会同时删除其所有对话，确定吗？')) {
            roles = roles.filter(r => r.id !== roleId);
            if (currentRoleId === roleId) {
                currentRoleId = roles[0].id;
                currentConversationId = roles[0].conversations[0]?.id || null;
            }
            saveData();
            renderSidebar();
            loadConversationToUI();
        }
    }

    function closeModal() {
        roleModal.style.display = 'none';
        window.editingRoleId = null;
    }

    // 主题和模型
    function loadTheme() {
        const saved = localStorage.getItem('deepseek_theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            themeToggle.innerHTML = '☀️ 日间模式';
        } else {
            document.body.classList.remove('dark');
            themeToggle.innerHTML = '🌙 夜晚模式';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('deepseek_theme', 'light');
            themeToggle.innerHTML = '🌙 夜晚模式';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('deepseek_theme', 'dark');
            themeToggle.innerHTML = '☀️ 日间模式';
        }
    }
    function onModelChange() {
        currentModel = modelSelect.value;
        saveData();
        addMessageToUI('assistant', `模型已切换为 ${currentModel === 'deepseek-chat' ? '标准对话' : '推理模型'}`);
    }

    // 事件绑定
    sendBtn.addEventListener('click', async () => {
        const text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        await sendMessage(text);
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendBtn.disabled) sendBtn.click();
    });
    addRoleBtn.addEventListener('click', () => openEditRoleModal(null));
    saveRoleBtn.addEventListener('click', saveRole);
    cancelModalBtn.addEventListener('click', closeModal);
    roleModal.addEventListener('click', (e) => { if (e.target === roleModal) closeModal(); });
    modelSelect.addEventListener('change', onModelChange);
    themeToggle.addEventListener('click', toggleTheme);
    confirmRenameBtn.addEventListener('click', renameConversation);
    cancelRenameBtn.addEventListener('click', () => renameConvModal.style.display = 'none');
    renameConvModal.addEventListener('click', (e) => { if (e.target === renameConvModal) renameConvModal.style.display = 'none'; });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 启动
    loadData();
    loadTheme();
    renderSidebar();
    loadConversationToUI();
</script>
</body>
</html>
